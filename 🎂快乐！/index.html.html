    <!-- ===== 深渊粒子背景 ===== -->

    <script>
        // ============================================================
        // 1. 深渊粒子背景
        // ============================================================
        (function() {
            const canvas = document.getElementById('abyss-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const particles = [];
            const COUNT = 160;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2.2 + 0.6;
                    this.speedX = (Math.random() - 0.5) * 0.25;
                    this.speedY = (Math.random() - 0.5) * 0.25 - 0.08;
                    this.opacity = Math.random() * 0.5 + 0.15;
                    this.pulse = Math.random() * Math.PI * 2;
                    this.pulseSpeed = 0.008 + Math.random() * 0.015;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.pulse += this.pulseSpeed;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) { this.reset();
                        this.y = 0; }
                }
                draw() {
                    const alpha = this.opacity * (0.7 + 0.3 * Math.sin(this.pulse));
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                    grad.addColorStop(0, `rgba(180, 210, 255, ${alpha})`);
                    grad.addColorStop(1, `rgba(100, 150, 255, 0)`);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.shadowColor = `rgba(100, 150, 255, ${alpha * 0.3})`;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            for (let i = 0; i < COUNT; i++) {
                particles.push(new Particle());
            }

            function animateParticles() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        })();

        // ============================================================

                style.textContent = `
                    .yes-screen {

                    .yes-screen .yes-text { font-size: clamp(2.4rem, 8vw, 4.2rem); font-weight: 700; letter-spacing: 8px; background: linear-gradient(135deg, #e0e8ff 0%, #ffdd77 40%, #ff9900 80%, #ff6b6b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-top: 12px; }

                    .yes-screen .yes-btn:hover { background: rgba(255,200,100,0.12); border-color: rgba(255,200,100,0.2); transform: scale(1.04); }
                    @keyframes fadeInScreen { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
                    @keyframes floatHeart { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.04); } }
                `;
                document.head.appendChild(style);
            }, lines.length * 300 + 1000);
        }, 600);
        return;
    }

    // Yes 按钮放大
    let yesScale = 1 + (clickCount * 0.5);

                const x = 10 + Math.random() * 80;
                const y = 10 + Math.random() * 80;
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200 - 100;
                star.style.cssText = `
                    position: fixed;
                    color: ${color};
                    font-size: ${size}px;
                    left: ${x}%;
                    top: ${y}%;
                    opacity: 0;
                    pointer-events: none;
                    z-index: 50;
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    animation: starFly ${0.8 + Math.random() * 0.8}s ease-out forwards;
                    animation-delay: ${Math.random() * 0.2}s;
                    text-shadow: 0 0 30px ${color}66;
                `;
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 2000);
            }
        }

        // 注入星星动画（如果还没注入）
        (function() {
            if (!document.querySelector('#starKeyframes')) {
                const style = document.createElement('style');
                style.id = 'starKeyframes';
                style.textContent = `
                    @keyframes starFly {
                        0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
                        100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0) rotate(720deg); }
                    }
                `;
                document.head.appendChild(style);
            }
        })();

        // ============================================================
        // 4. 键盘快捷键
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                if (yesButton) yesButton.click();
            }
            if (e.key === 'n' || e.key === 'N') {
                if (noButton) noButton.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                location.reload();
            }
        });

        // ============================================================
        // 5. 控制台提示
        // ============================================================
        console.log('💜 深渊告白小提示：');
        console.log('  按 Enter/空格 → 点“可以”');
        console.log('  按 N → 点“不要”');
        console.log('  按 R → 重新开始');
        console.log('  点击“不要”会有惊喜…');
    </script>

</body>
</html>
